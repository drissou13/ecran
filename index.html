<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horloge de Nuit (Effet DVD)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            cursor: none; /* Masque la souris */
            touch-action: none; 
        }

        #screensaver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background-color: #000000;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #clock {
            position: absolute;
            color: rgb(220, 60, 40); /* Couleur initiale */
            font-size: clamp(40px, 14vw, 120px); 
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
            will-change: transform, left, top;
        }

        .info-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            letter-spacing: 1px;
            font-family: sans-serif;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="screensaver">
        <canvas id="starsCanvas"></canvas>
        <div id="clock">00:00:00</div>
        <div class="info-text">Cliquez ou touchez l'écran pour quitter</div>
    </div>

    <script>
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        const clock = document.getElementById('clock');

        // Position initiale (en haut à gauche pour simplifier les calculs de collision)
        let clockX = 100;
        let clockY = 100;
        
        // Vitesse de déplacement (ajustée pour l'effet DVD)
        let dx = 2; 
        let dy = 2;

        // Liste de couleurs éclatantes pour l'effet DVD
        const colors = [
            'rgb(220, 60, 40)',   // Rouge
            'rgb(40, 220, 100)',  // Vert
            'rgb(40, 150, 220)',  // Bleu
            'rgb(220, 200, 40)',  // Jaune
            'rgb(200, 40, 220)',  // Magenta
            'rgb(40, 220, 220)',  // Cyan
            'rgb(255, 140, 0)'    // Orange
        ];

        function changeColor() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            clock.style.color = randomColor;
            clock.style.textShadow = `0 0 20px ${randomColor.replace('rgb', 'rgba').replace(')', ', 0.6)')}`;
        }

        function resizeComponents() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeComponents();
        window.addEventListener('resize', resizeComponents);
        window.addEventListener('orientationchange', resizeComponents);

        // --- HORLOGE ---
        function updateClock() {
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('fr-FR');
        }
        setInterval(updateClock, 1000);
        updateClock();
        changeColor(); // Applique la première couleur et l'ombre au démarrage

        // --- ANIMATION STYLE DVD ---
        function moveClock() {
            const clockWidth = clock.offsetWidth;
            const clockHeight = clock.offsetHeight;
            let hit = false;

            // Rebond horizontal
            if (clockX + dx + clockWidth > window.innerWidth || clockX + dx < 0) {
                dx = -dx;
                hit = true;
            }
            // Rebond vertical
            if (clockY + dy + clockHeight > window.innerHeight || clockY + dy < 0) {
                dy = -dy;
                hit = true;
            }

            if (hit) {
                changeColor();
            }

            // Mise à jour des coordonnées
            clockX += dx;
            clockY += dy;

            // Application des styles
            clock.style.left = `${clockX}px`;
            clock.style.top = `${clockY}px`;
        }

        // --- ÉTOILES ARRIÈRE-PLAN ---
        const stars = [];
        const starCount = Math.min(50, window.innerWidth / 15);
        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.3,
                alpha: Math.random(),
                speed: Math.random() * 0.008 + 0.003
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 0.8 || star.alpha < 0.1) star.speed = -star.speed;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha * 0.15})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // --- BOUCLE PRINCIPALE ---
        function loop() {
            drawStars();
            moveClock();
            requestAnimationFrame(loop);
        }
        
        // Attendre un court instant que le layout soit calculé pour lancer proprement
        setTimeout(loop, 100);

        // --- SORTIE DE VEILLE ---
        function exitScreensaver() {
            const screensaver = document.getElementById('screensaver');
            screensaver.style.transform = 'scale(0)';
            screensaver.style.opacity = '0';
            setTimeout(() => {
                screensaver.style.display = 'none';
                document.body.style.cursor = 'default';
            }, 300);
        }

        window.addEventListener('keydown', exitScreensaver);  
        window.addEventListener('click', exitScreensaver);    
        window.addEventListener('touchstart', exitScreensaver);
    </script>
</body>
</html>
